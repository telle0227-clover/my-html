<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오뚜기 컵밥 음성 안내</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0A0A0A; color: #F5F5F5;
  font-family: 'Noto Sans KR', sans-serif;
  max-width: 480px; margin: 0 auto; min-height: 100vh;
}

/* ── 시작 화면 ── */
#startScreen {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: #0A0A0A; z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px; text-align: center;
  cursor: pointer;
}
#startScreen .logo { font-size:20px; font-weight:900; color:#FFD600; margin-bottom:32px; }
#startScreen .icon { font-size:80px; margin-bottom:28px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
#startScreen .title { font-size:22px; font-weight:900; color:#F5F5F5; margin-bottom:12px; line-height:1.4; }
#startScreen .sub { font-size:16px; color:#aaa; margin-bottom:48px; line-height:1.6; }
#startBtn {
  width:100%; max-width:320px; background:#FFD600; color:#000;
  font-size:24px; font-weight:900; padding:24px;
  border-radius:20px; border:none; cursor:pointer;
  animation: pulse 1.5s ease-in-out infinite;
}

/* ── 메인 화면 ── */
#mainScreen { display: none; }
.topbar {
  background:#141414; border-bottom:3px solid #FFD600;
  padding:14px 20px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:100;
}
.topbar-logo { font-size:18px; font-weight:900; color:#FFD600; }
.topbar-logo span { color:#F5F5F5; }

.voice-bar {
  background:#1a2a00; border-bottom:2px solid #00E5A0;
  padding:12px 20px; display:flex; align-items:center;
  gap:10px; min-height:52px;
}
.wave { display:flex; gap:3px; align-items:center; height:20px; }
.wave span {
  display:block; width:4px; background:#00E5A0;
  border-radius:2px; animation:wave 0.8s ease-in-out infinite;
}
.wave span:nth-child(1){animation-delay:0s}
.wave span:nth-child(2){animation-delay:0.1s}
.wave span:nth-child(3){animation-delay:0.2s}
.wave span:nth-child(4){animation-delay:0.15s}
.wave span:nth-child(5){animation-delay:0.05s}
@keyframes wave { 0%,100%{height:4px} 50%{height:18px} }
.wave.hidden { display:none; }
.voice-text { font-size:14px; color:#00E5A0; font-weight:700; flex:1; line-height:1.5; }

.menu { padding:16px; display:flex; flex-direction:column; gap:12px; }
.menu-btn {
  background:#1E1E1E; border:2px solid #2A2A2A; border-radius:16px;
  padding:0; width:100%; cursor:pointer; display:flex; align-items:center;
  overflow:hidden; text-align:left; transition:border-color 0.15s;
}
.menu-btn.active { border-color:#FFD600; background:#1a1800; }
.menu-btn .num {
  background:#2A2A2A; color:#FFD600; font-size:24px; font-weight:900;
  width:68px; min-height:84px; display:flex; align-items:center;
  justify-content:center; flex-shrink:0;
}
.menu-btn.active .num { background:#FFD600; color:#000; }
.menu-btn .info { padding:16px; flex:1; }
.menu-btn .info .title { font-size:18px; font-weight:700; color:#F5F5F5; margin-bottom:4px; }
.menu-btn .info .sub { font-size:13px; color:#888; }
.menu-btn .info .content { font-size:15px; color:#00E5A0; margin-top:10px; line-height:1.7; display:none; }
.menu-btn.active .info .content { display:block; }
.menu-btn .play-icon { padding:0 16px; font-size:22px; color:#444; flex-shrink:0; }
.menu-btn.active .play-icon { color:#FFD600; }

.stop-btn {
  margin:4px 16px 32px; background:#1E1E1E; border:2px solid #444;
  border-radius:16px; padding:14px; width:calc(100% - 32px);
  font-size:16px; font-weight:700; color:#aaa; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
</style>
</head>
<body>

<!-- ── 시작 화면: 탭 유도 ── -->
<div id="startScreen" onclick="startVoice()">
  <div class="logo">오뚜기 컵밥</div>
  <div class="icon">🔊</div>
  <div class="title">음성 안내 서비스</div>
  <div class="sub">
    화면을 터치하면<br>
    음성 안내가 시작됩니다<br><br>
    <span style="font-size:14px; color:#666;">
      일번~육번 정보를 음성으로<br>안내해 드립니다
    </span>
  </div>
  <button id="startBtn">▶ 음성 안내 시작</button>
</div>

<!-- ── 메인 화면 ── -->
<div id="mainScreen">
  <header class="topbar">
    <div class="topbar-logo">오뚜기<span> 컵밥</span></div>
    <div style="font-size:12px;color:#555;">음성 안내 서비스</div>
  </header>

  <div class="voice-bar">
    <div class="wave hidden" id="waveAnim">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="voice-text" id="voiceText">음성 안내 중...</div>
  </div>

  <div class="menu">
    <button class="menu-btn" id="btn-all" onclick="speakAll()">
      <div class="num">★</div>
      <div class="info">
        <div class="title">전체 정보 듣기</div>
        <div class="sub">모든 정보를 순서대로 안내합니다</div>
      </div>
      <div class="play-icon">▶</div>
    </button>
    <button class="menu-btn" id="btn-1" onclick="speakItem(1)">
      <div class="num">1</div>
      <div class="info">
        <div class="title">제품명</div>
        <div class="sub">제품 이름과 용량</div>
        <div class="content">뚝배기 불고기밥. 즉석국 포함. 290그램입니다.</div>
      </div>
      <div class="play-icon">▶</div>
    </button>
    <button class="menu-btn" id="btn-2" onclick="speakItem(2)">
      <div class="num">2</div>
      <div class="info">
        <div class="title">유통기한</div>
        <div class="sub">소비기한 날짜 안내</div>
        <div class="content">유통기한은 2025년 12월 31일입니다.</div>
      </div>
      <div class="play-icon">▶</div>
    </button>
    <button class="menu-btn" id="btn-3" onclick="speakItem(3)">
      <div class="num">3</div>
      <div class="info">
        <div class="title">알레르기</div>
        <div class="sub">유발 성분 경고</div>
        <div class="content">알레르기 유발 성분은 밀, 대두, 돼지고기, 쇠고기, 계란입니다.</div>
      </div>
      <div class="play-icon">▶</div>
    </button>
    <button class="menu-btn" id="btn-4" onclick="speakItem(4)">
      <div class="num">4</div>
      <div class="info">
        <div class="title">영양성분</div>
        <div class="sub">1회 제공량 기준</div>
        <div class="content">열량 390킬로칼로리. 탄수화물 62그램. 단백질 14그램. 지방 9그램. 나트륨 740밀리그램.</div>
      </div>
      <div class="play-icon">▶</div>
    </button>
    <button class="menu-btn" id="btn-5" onclick="speakItem(5)">
      <div class="num">5</div>
      <div class="info">
        <div class="title">조리방법</div>
        <div class="sub">전자레인지 기준</div>
        <div class="content">뚜껑을 절취선까지 열고, 전자레인지에서 2분 30초 가열 후 잘 저어드세요. 즉석국은 별도 1분 가열합니다.</div>
      </div>
      <div class="play-icon">▶</div>
    </button>
    <button class="menu-btn" id="btn-6" onclick="speakItem(6)">
      <div class="num">6</div>
      <div class="info">
        <div class="title">보관방법</div>
        <div class="sub">올바른 보관 안내</div>
        <div class="content">직사광선을 피해 서늘한 곳에 실온 보관하세요. 개봉 후 즉시 드세요.</div>
      </div>
      <div class="play-icon">▶</div>
    </button>
  </div>

  <button class="stop-btn" onclick="stopSpeak()">⏹ 정지</button>
</div>

<script>
const ITEMS = {
  1: { text:"일번. 제품명. 뚝배기 불고기밥. 즉석국 포함. 290그램입니다." },
  2: { text:"이번. 유통기한. 2025년 12월 31일입니다. 소비기한을 확인 후 드세요." },
  3: { text:"삼번. 알레르기 유발 성분. 밀, 대두, 돼지고기, 쇠고기, 계란이 포함되어 있습니다. 해당 성분에 알레르기가 있으신 분은 주의하세요." },
  4: { text:"사번. 영양성분. 열량 390킬로칼로리. 탄수화물 62그램. 단백질 14그램. 지방 9그램. 나트륨 740밀리그램입니다." },
  5: { text:"오번. 조리방법. 첫째, 뚜껑을 절취선까지 열어주세요. 둘째, 전자레인지에서 2분 30초 가열하세요. 셋째, 꺼낸 후 잘 저어주세요. 뜨거우니 주의하세요. 즉석국은 별도로 1분 가열합니다." },
  6: { text:"육번. 보관방법. 직사광선을 피해 서늘하고 건조한 곳에 실온 보관하세요. 개봉 후에는 즉시 드세요. 냉동 보관하지 마세요." },
};
const INTRO = "오뚜기 컵밥 음성 안내 서비스입니다. " +
  "일번은 제품명, 이번은 유통기한, 삼번은 알레르기 성분, " +
  "사번은 영양성분, 오번은 조리방법, 육번은 보관방법입니다. " +
  "원하시는 번호를 화면에서 선택해주세요.";
const GUIDE = "다른 정보를 들으시려면 번호를 선택하세요. " +
  "일번 제품명, 이번 유통기한, 삼번 알레르기, " +
  "사번 영양성분, 오번 조리방법, 육번 보관방법.";

let allQueue = [];

function setStatus(text, playing) {
  document.getElementById('voiceText').textContent = text;
  const w = document.getElementById('waveAnim');
  playing ? w.classList.remove('hidden') : w.classList.add('hidden');
}

function setActive(id) {
  document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
  if (id) {
    const btn = document.getElementById('btn-' + id);
    if (btn) { btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth', block:'nearest'}); }
  }
}

function doSpeak(text, onEnd) {
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = 0.85; u.volume = 1.0; u.pitch = 1.0;
    u.onstart = () => setStatus(text.substring(0,20) + '...', true);
    u.onend   = () => { setStatus('번호를 선택하세요 (일~육)', false); onEnd && onEnd(); };
    u.onerror = (e) => {
      if (e.error === 'interrupted' || e.error === 'canceled') return;
      setStatus('번호를 선택하세요 (일~육)', false);
      onEnd && onEnd();
    };
    window.speechSynthesis.speak(u);
  }, 100);
}

// ── 시작 버튼 탭 → 화면 전환 + 인트로 음성 ──
function startVoice() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  // 사용자 탭 이후라 음성 바로 가능
  doSpeak(INTRO);
}

function speakItem(num) {
  allQueue = [];
  setActive(num);
  doSpeak(ITEMS[num].text, () => {
    setTimeout(() => doSpeak(GUIDE), 400);
  });
}

function speakAll() {
  allQueue = [1,2,3,4,5,6];
  setActive('all');
  nextQueue();
}
function nextQueue() {
  if (!allQueue.length) {
    setActive(null);
    setTimeout(() => doSpeak("전체 안내 완료. " + GUIDE), 300);
    return;
  }
  const n = allQueue.shift();
  setActive(n);
  doSpeak(ITEMS[n].text, () => setTimeout(nextQueue, 500));
}

function stopSpeak() {
  window.speechSynthesis.cancel();
  allQueue = [];
  setActive(null);
  setStatus('정지되었습니다. 번호를 선택하세요.', false);
}
</script>
</body>
</html>
