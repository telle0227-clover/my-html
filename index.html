<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오뚜기 컵밥 - 음성 안내</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A0A; color: #F5F5F5;
    font-family: 'Noto Sans KR', sans-serif;
    max-width: 480px; margin: 0 auto; min-height: 100vh;
  }
  .topbar {
    background: #141414; border-bottom: 3px solid #FFD600;
    padding: 14px 20px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { font-size: 18px; font-weight: 900; color: #FFD600; }
  .topbar-logo span { color: #F5F5F5; }

  .font-bar {
    display: flex; gap: 8px; padding: 10px 16px;
    background: #141414; border-bottom: 1px solid #222; align-items: center;
  }
  .font-bar span { font-size: 12px; color: #666; margin-right: 4px; }
  .font-btn {
    background: #1E1E1E; border: 1px solid #333; color: #aaa;
    border-radius: 8px; padding: 5px 12px; font-family: inherit; cursor: pointer;
  }
  .font-btn.on { background: #FFD600; color: #000; border-color: #FFD600; outline: none; }

  .voice-bar {
    background: #1a2a00; border-bottom: 2px solid #00E5A0;
    padding: 10px 20px; display: flex; align-items: center;
    gap: 10px; min-height: 48px;
  }
  .wave { display: flex; gap: 3px; align-items: center; height: 20px; }
  .wave span {
    display: block; width: 4px; background: #00E5A0;
    border-radius: 2px; animation: wave 0.8s ease-in-out infinite;
  }
  .wave span:nth-child(1){animation-delay:0s}
  .wave span:nth-child(2){animation-delay:0.1s}
  .wave span:nth-child(3){animation-delay:0.2s}
  .wave span:nth-child(4){animation-delay:0.15s}
  .wave span:nth-child(5){animation-delay:0.05s}
  @keyframes wave { 0%,100%{height:4px} 50%{height:18px} }
  .wave.hidden { display: none; }
  .voice-text { font-size: 14px; color: #00E5A0; font-weight: 700; flex: 1; line-height: 1.5; }

  .menu { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .menu-btn {
    background: #1E1E1E; border: 2px solid #2A2A2A; border-radius: 16px;
    padding: 0; width: 100%; cursor: pointer; display: flex; align-items: center;
    transition: border-color 0.15s, background 0.15s; overflow: hidden; text-align: left;
  }
  .menu-btn:focus, .menu-btn.active { border-color: #FFD600; background: #1a1800; outline: none; }
  .menu-btn .num {
    background: #2A2A2A; color: #FFD600; font-size: 22px; font-weight: 900;
    width: 64px; min-height: 80px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .menu-btn.active .num { background: #FFD600; color: #000; }
  .menu-btn .info { padding: 16px; flex: 1; }
  .menu-btn .info .title { font-size: 18px; font-weight: 700; color: #F5F5F5; margin-bottom: 4px; }
  .menu-btn .info .sub { font-size: 13px; color: #888; }
  .menu-btn .info .content {
    font-size: 15px; color: #00E5A0; margin-top: 8px;
    line-height: 1.6; display: none;
  }
  .menu-btn.active .info .content { display: block; }
  .menu-btn .play-icon { padding: 0 16px; font-size: 22px; color: #444; flex-shrink: 0; }
  .menu-btn.active .play-icon { color: #FFD600; }

  .stop-btn {
    margin: 0 16px 24px; background: #1E1E1E; border: 2px solid #444;
    border-radius: 16px; padding: 14px; width: calc(100% - 32px);
    font-size: 16px; font-weight: 700; color: #aaa; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }

  body.font-lg .menu-btn .info .title { font-size: 22px; }
  body.font-lg .menu-btn .info .content { font-size: 18px; }
  body.font-lg .menu-btn .num { font-size: 26px; }
  body.font-xl .menu-btn .info .title { font-size: 26px; }
  body.font-xl .menu-btn .info .content { font-size: 21px; }
  body.font-xl .menu-btn .num { font-size: 30px; width: 72px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">오뚜기<span> 컵밥</span></div>
  <div style="font-size:12px;color:#555;">음성 안내 서비스</div>
</header>

<div class="font-bar">
  <span>글자크기</span>
  <button class="font-btn on" onclick="setFont('normal',this)">기본</button>
  <button class="font-btn" onclick="setFont('lg',this)">크게</button>
  <button class="font-btn" onclick="setFont('xl',this)">매우 크게</button>
</div>

<div class="voice-bar" id="voiceBar">
  <div class="wave hidden" id="waveAnim">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="voice-text" id="voiceText">잠시 후 음성 안내가 시작됩니다...</div>
</div>

<div class="menu" id="menuArea">
  <button class="menu-btn" id="btn-all" onclick="speakAll()" aria-label="전체 정보 듣기">
    <div class="num">★</div>
    <div class="info">
      <div class="title">전체 정보 듣기</div>
      <div class="sub">모든 정보를 순서대로 안내합니다</div>
    </div>
    <div class="play-icon">▶</div>
  </button>
  <button class="menu-btn" id="btn-1" onclick="speakItem(1)" aria-label="일번 제품명">
    <div class="num">1</div>
    <div class="info">
      <div class="title">제품명</div>
      <div class="sub">제품 이름과 용량</div>
      <div class="content">뚝배기 불고기밥. 즉석국 포함. 290그램입니다.</div>
    </div>
    <div class="play-icon">▶</div>
  </button>
  <button class="menu-btn" id="btn-2" onclick="speakItem(2)" aria-label="이번 유통기한">
    <div class="num">2</div>
    <div class="info">
      <div class="title">유통기한</div>
      <div class="sub">소비기한 날짜 안내</div>
      <div class="content">유통기한은 2025년 12월 31일입니다. 소비기한을 확인 후 드세요.</div>
    </div>
    <div class="play-icon">▶</div>
  </button>
  <button class="menu-btn" id="btn-3" onclick="speakItem(3)" aria-label="삼번 알레르기">
    <div class="num">3</div>
    <div class="info">
      <div class="title">알레르기</div>
      <div class="sub">유발 성분 경고</div>
      <div class="content">알레르기 유발 성분은 밀, 대두(콩), 돼지고기, 쇠고기, 계란입니다.</div>
    </div>
    <div class="play-icon">▶</div>
  </button>
  <button class="menu-btn" id="btn-4" onclick="speakItem(4)" aria-label="사번 영양성분">
    <div class="num">4</div>
    <div class="info">
      <div class="title">영양성분</div>
      <div class="sub">1회 제공량 기준</div>
      <div class="content">열량 390킬로칼로리. 탄수화물 62그램. 단백질 14그램. 지방 9그램. 나트륨 740밀리그램.</div>
    </div>
    <div class="play-icon">▶</div>
  </button>
  <button class="menu-btn" id="btn-5" onclick="speakItem(5)" aria-label="오번 조리방법">
    <div class="num">5</div>
    <div class="info">
      <div class="title">조리방법</div>
      <div class="sub">전자레인지 기준</div>
      <div class="content">뚜껑을 절취선까지 열고, 전자레인지에서 2분 30초 가열 후 잘 저어드세요. 뜨거우니 주의하세요.</div>
    </div>
    <div class="play-icon">▶</div>
  </button>
  <button class="menu-btn" id="btn-6" onclick="speakItem(6)" aria-label="육번 보관방법">
    <div class="num">6</div>
    <div class="info">
      <div class="title">보관방법</div>
      <div class="sub">올바른 보관 안내</div>
      <div class="content">직사광선을 피해 서늘한 곳에 실온 보관하세요. 개봉 후에는 즉시 드세요.</div>
    </div>
    <div class="play-icon">▶</div>
  </button>
</div>

<button class="stop-btn" onclick="stopSpeak()">⏹ 정지</button>

<script>
const items = {
  1: { title:"제품명",   text:"일번. 제품명. 뚝배기 불고기밥. 즉석국 포함. 290그램입니다." },
  2: { title:"유통기한", text:"이번. 유통기한. 2025년 12월 31일입니다. 소비기한을 확인 후 드세요." },
  3: { title:"알레르기", text:"삼번. 알레르기 유발 성분. 밀, 대두, 돼지고기, 쇠고기, 계란이 포함되어 있습니다. 해당 성분에 알레르기가 있으신 분은 주의하세요." },
  4: { title:"영양성분", text:"사번. 영양성분. 1회 제공량 290그램 기준. 열량 390킬로칼로리. 탄수화물 62그램. 단백질 14그램. 지방 9그램. 나트륨 740밀리그램입니다." },
  5: { title:"조리방법", text:"오번. 조리방법. 첫째, 뚜껑을 절취선까지 열어주세요. 둘째, 전자레인지에서 2분 30초 가열하세요. 셋째, 꺼낸 후 잘 저어주세요. 뜨거우니 주의하세요. 즉석국은 별도로 1분 가열합니다." },
  6: { title:"보관방법", text:"육번. 보관방법. 직사광선을 피해 서늘하고 건조한 곳에 실온 보관하세요. 개봉 후에는 즉시 드세요. 냉동 보관하지 마세요." },
};

const INTRO = "오뚜기 컵밥 음성 안내 서비스입니다. " +
  "일번은 제품명, " +
  "이번은 유통기한, " +
  "삼번은 알레르기 성분, " +
  "사번은 영양성분, " +
  "오번은 조리방법, " +
  "육번은 보관방법입니다. " +
  "원하시는 번호를 화면에서 선택해주세요.";

const GUIDE = "다른 정보를 들으시려면 번호를 선택하세요. " +
  "일번 제품명, 이번 유통기한, 삼번 알레르기, " +
  "사번 영양성분, 오번 조리방법, 육번 보관방법.";

let voiceReady = false;
let allQueue = [];

// ── 상태 표시 ──
function setStatus(text, playing) {
  document.getElementById('voiceText').textContent = text;
  const w = document.getElementById('waveAnim');
  playing ? w.classList.remove('hidden') : w.classList.add('hidden');
}

// ── 버튼 활성화 ──
function setActive(id) {
  document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
  if (id) {
    const btn = document.getElementById('btn-' + id);
    if (btn) { btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  }
}

// ── 핵심 speak 함수 ──
function speak(text, onEnd) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.88; u.pitch = 1.0; u.volume = 1.0;
  u.onstart = () => setStatus(text.substring(0, 18) + '...', true);
  u.onend   = () => { setStatus('번호를 선택하세요 (일~육)', false); onEnd && onEnd(); };
  u.onerror = () => { setStatus('오류. 다시 시도해주세요.', false); onEnd && onEnd(); };
  window.speechSynthesis.speak(u);
}

// ── 음성 잠금 해제 후 실행 ──
function unlockThenSpeak(text, onEnd) {
  if (voiceReady) { speak(text, onEnd); return; }
  const dummy = new SpeechSynthesisUtterance(' ');
  dummy.volume = 0;
  dummy.onend = () => { voiceReady = true; speak(text, onEnd); };
  dummy.onerror = () => { voiceReady = true; speak(text, onEnd); };
  window.speechSynthesis.speak(dummy);
}

// ── 항목 안내 ──
function speakItem(num) {
  allQueue = [];
  setActive(num);
  setStatus(items[num].title + ' 안내 중...', true);
  unlockThenSpeak(items[num].text, () => {
    setTimeout(() => unlockThenSpeak(GUIDE), 400);
  });
}

// ── 전체 순서 안내 ──
function speakAll() {
  allQueue = [1,2,3,4,5,6];
  setActive('all');
  nextInQueue();
}

function nextInQueue() {
  if (allQueue.length === 0) {
    setActive(null);
    setTimeout(() => unlockThenSpeak("전체 안내가 완료되었습니다. " + GUIDE), 300);
    return;
  }
  const num = allQueue.shift();
  setActive(num);
  unlockThenSpeak(items[num].text, () => setTimeout(nextInQueue, 500));
}

// ── 정지 ──
function stopSpeak() {
  window.speechSynthesis.cancel();
  allQueue = [];
  setActive(null);
  setStatus('정지되었습니다. 번호를 선택하세요.', false);
}

// ── 글자 크기 ──
function setFont(size, el) {
  document.body.classList.remove('font-lg','font-xl');
  if (size==='lg') document.body.classList.add('font-lg');
  if (size==='xl') document.body.classList.add('font-xl');
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

// ══════════════════════════════════════════
// 페이지 로드: 브라우저 감지 → 자동 크롬 이동 또는 음성 시작
// ══════════════════════════════════════════
window.addEventListener('load', () => {
  const ua = navigator.userAgent;
  const isAndroid = /Android/i.test(ua);
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isMobile = isAndroid || isIOS;
  const isChrome = /Chrome/.test(ua) && !/Edg|OPR|SamsungBrowser|NaverApp/.test(ua);
  const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua);
  const isSupported = isChrome || isSafari;

  if (isMobile && !isSupported) {
    // ── 크롬/사파리가 아닌 경우 → 자동으로 크롬 이동 시도 ──
    setStatus('크롬 브라우저로 이동합니다...', false);

    const url = window.location.href;
    if (isAndroid) {
      // 안드로이드: intent URL로 크롬 강제 실행
      const intentUrl = 'intent://' + url.replace(/^https?:\/\//, '') +
        '#Intent;scheme=https;package=com.android.chrome;end';
      window.location.href = intentUrl;

      // 3초 후에도 남아있으면 안내 표시
      setTimeout(() => {
        setStatus('크롬 앱을 설치 후 다시 시도해주세요.', false);
        document.getElementById('voiceText').innerHTML =
          '크롬 앱을 설치 후 다시 시도해주세요.<br>' +
          '<a href="https://play.google.com/store/apps/details?id=com.android.chrome" ' +
          'style="color:#FFD600;font-size:15px;">크롬 설치하기 →</a>';
      }, 3000);
    } else if (isIOS) {
      // iOS: googlechrome 스킴
      window.location.href = 'googlechrome://' + url.replace(/^https?:\/\//, '');
      setTimeout(() => {
        setStatus('사파리에서도 이용 가능합니다. 잠시 후 안내가 시작됩니다.', false);
        setTimeout(() => unlockThenSpeak(INTRO), 1000);
      }, 2000);
    }
    return;
  }

  // ── 크롬/사파리: 바로 음성 안내 시작 ──
  setTimeout(() => {
    unlockThenSpeak(INTRO);
  }, 800);
});
</script>
</body>
</html>
