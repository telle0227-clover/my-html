<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 마음 보드판 꾸미기</title>
    <style>
        :root { --primary: #ff9ff3; --secondary: #feca57; --like: #ff6b6b; --dislike: #54a0ff; --bg: #fff5f7; }
        body { font-family: 'Nanum Gothic', sans-serif; background-color: var(--bg); text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 40px; box-shadow: 0 15px 50px rgba(255, 159, 243, 0.2); border: 5px solid var(--primary); }
        
        h1 { color: #ee5253; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav { margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; }
        button.level-btn { padding: 12px 25px; font-size: 18px; cursor: pointer; border-radius: 20px; border: 3px solid #eee; background: white; font-weight: bold; transition: 0.3s; color: #555; }
        button.level-btn.active { border-color: var(--primary); background: var(--primary); color: white; transform: translateY(-3px); }

        .control-panel { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .reset-btn { background: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #e67e22; }
        .reset-btn:active { transform: translateY(2px); box-shadow: none; }

        .instruction-box { background: #fff9db; padding: 15px; border-radius: 20px; margin-bottom: 20px; font-size: 20px; color: #d35400; font-weight: bold; border: 2px dashed var(--secondary); }
        
        .board-container { display: flex; justify-content: space-around; gap: 20px; margin-top: 10px; }
        .board { width: 48%; min-height: 380px; border: 5px dotted #ced4da; border-radius: 35px; padding: 20px; transition: 0.3s; background: #fff; }
        .board.like { border-color: var(--like); background: #fffafa; }
        .board.dislike { border-color: var(--dislike); background: #f0faff; }
        .board h2 { margin-top: 0; font-size: 24px; color: #333; }
        .board-emoji { font-size: 60px; display: block; margin-bottom: 10px; }

        .item-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; min-height: 100px; padding: 20px; background: #fdfdfd; border-radius: 25px; border: 2px solid #f1f2f6; }
        .item { padding: 15px; background: white; border: 3px solid #f1f2f6; border-radius: 20px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; min-width: 80px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .item span { font-size: 45px; }
        .item.text-only { font-size: 24px; font-weight: bold; color: #5f27cd; min-width: 100px; padding: 20px; border-color: #5f27cd; }
        .item.selected { border-color: var(--primary); transform: scale(1.1); background: #fef0ff; }

        /* 다수준용 두 가지 선택지 팝업 */
        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 999; backdrop-filter: blur(5px); }
        #popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 50px; box-shadow: 0 0 50px rgba(0,0,0,0.2); display: none; z-index: 1000; text-align: center; width: 90%; max-width: 600px; }
        .popup-guide { font-size: 26px; font-weight: bold; color: #2d3436; margin-bottom: 30px; }
        .choice-container { display: flex; justify-content: center; gap: 30px; }
        .choice-btn { border: none; background: none; cursor: pointer; transition: transform 0.2s; text-align: center; }
        .choice-btn:hover { transform: scale(1.1); }
        .choice-btn span { font-size: 140px; display: block; }
        .choice-btn p { font-size: 24px; font-weight: bold; margin-top: 10px; color: #333; }

        .share-btn { background: #1dd1a1; color: white; border: none; padding: 18px; font-size: 22px; border-radius: 50px; cursor: pointer; margin-top: 25px; font-weight: bold; width: 100%; box-shadow: 0 6px 0 #10ac84; }
    </style>
</head>
<body>

<div class="container">
    <h1>💖 나의 마음 보드판 꾸미기</h1>
    
    <div class="nav">
        <button class="level-btn" onclick="setLevel('가')">가 수준</button>
        <button class="level-btn" onclick="setLevel('나')">나 수준</button>
        <button class="level-btn" onclick="setLevel('다')">다 수준</button>
    </div>

    <div class="control-panel">
        <button class="reset-btn" onclick="resetGame()">🔄 처음부터 다시 꾸미기</button>
    </div>

    <div class="instruction-box" id="inst">친구야 반가워! 우리 같이 보드판을 꾸며볼까?</div>
    
    <div class="item-list" id="items-box"></div>

    <div class="board-container">
        <div class="board like" id="board-like" onclick="moveNaItem('like')" ondrop="drop(event, 'like')" ondragover="allowDrop(event)">
            <h2><span class="board-emoji">😊</span>좋아요</h2>
            <div id="content-like" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
        </div>
        <div class="board dislike" id="board-dislike" onclick="moveNaItem('dislike')" ondrop="drop(event, 'dislike')" ondragover="allowDrop(event)">
            <h2><span class="board-emoji">😣</span>싫어요</h2>
            <div id="content-dislike" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
        </div>
    </div>

    <button class="share-btn" onclick="shareResults()">📸 완성! 선생님과 친구들에게 보여주기</button>
</div>

<div id="popup-overlay"></div>
<div id="popup">
    <div class="popup-guide" id="popup-text">이 과일이 어때요?</div>
    <div class="choice-container">
        <button class="choice-btn" onclick="completeDaMove('like')">
            <span>😊</span>
            <p>좋아요!</p>
        </button>
        <button class="choice-btn" onclick="completeDaMove('dislike')">
            <span>😣</span>
            <p>싫어요!</p>
        </button>
    </div>
</div>

<script>
    // 재미있는 고음톤 효과음
    const sndPop = new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg');
    const sndSuccess = new Audio('https://actions.google.com/sounds/v1/cartoon/clank_congrats.ogg');
    const sndSlide = new Audio('https://actions.google.com/sounds/v1/cartoon/slide_whistle_up.ogg');
    const sndSelection = new Audio('https://actions.google.com/sounds/v1/cartoon/toy_honk.ogg');

    const data = [
        { n: "수박", i: "🍉" }, { n: "딸기", i: "🍓" }, { n: "포도", i: "🍇" }, 
        { n: "사과", i: "🍎" }, { n: "참외", i: "🍈" }, { n: "브로콜리", i: "🥦" },
        { n: "장난감", i: "🧸" }, { n: "우유", i: "🥛" }
    ];

    let currentLevel = '';
    let selectedItem = null;
    let selectedName = '';

    // 음성을 하이톤(pitch 1.4) 및 친근한 톤으로 설정
    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ko-KR';
        msg.rate = 1.0; 
        msg.pitch = 1.4; // 하이톤으로 설정 (1.0이 보통, 1.4는 높고 귀여운 톤)
        window.speechSynthesis.speak(msg);
    }

    function setLevel(l) {
        currentLevel = l;
        sndSelection.play();
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        resetGame();
    }

    function resetGame() {
        document.getElementById('items-box').innerHTML = '';
        document.getElementById('content-like').innerHTML = '';
        document.getElementById('content-dislike').innerHTML = '';
        if(!currentLevel) return;

        let intro = "";
        if(currentLevel === '가') intro = "안녕! 낱말을 드래그해서 네 마음을 표현해봐!";
        else if(currentLevel === '나') intro = "반가워! 그림을 클릭하고 보드판을 눌러볼까?";
        else intro = "친구야 안녕! 그림을 누르고 네 기분을 골라줘!";
        
        document.getElementById('inst').textContent = intro;
        speak(intro);
        renderItems();
    }

    function renderItems() {
        const box = document.getElementById('items-box');
        data.forEach((item, idx) => {
            const div = document.createElement('div');
            div.id = 'item-' + idx;
            if (currentLevel === '가') {
                div.className = 'item text-only';
                div.textContent = item.n;
                div.draggable = true;
                div.ondragstart = (e) => { 
                    e.dataTransfer.setData("text", e.target.id); 
                    speak(item.n);
                };
            } else {
                div.className = 'item';
                div.innerHTML = `<span>${item.i}</span>${currentLevel === '나' ? item.n : ''}`;
                div.onclick = () => handleItemClick(div, item.n);
            }
            box.appendChild(div);
        });
    }

    function handleItemClick(el, name) {
        sndPop.play();
        selectedItem = el;
        selectedName = name;
        speak(name);

        if (currentLevel === '나') {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        } else if (currentLevel === '다') {
            document.getElementById('popup-text').textContent = `${name}는 어때요?`;
            document.getElementById('popup-overlay').style.display = 'block';
            document.getElementById('popup').style.display = 'block';
            speak(`${name}는 어때? 네 마음을 골라봐!`);
        }
    }

    function moveNaItem(type) {
        if (currentLevel === '나' && selectedItem) {
            const boardName = (type === 'like') ? '좋아요' : '싫어요';
            speak(`${selectedName} ${boardName}! 정말 멋진 선택이야!`);
            document.getElementById('content-' + type).appendChild(selectedItem);
            selectedItem.classList.remove('selected');
            selectedItem = null;
            sndSlide.play();
        }
    }

    function completeDaMove(type) {
        if (selectedItem) {
            const boardName = (type === 'like') ? '좋아요' : '싫어요';
            speak(`${selectedName} ${boardName}! 정말 잘했어!`);
            document.getElementById('content-' + type).appendChild(selectedItem);
            document.getElementById('popup-overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none';
            selectedItem = null;
            sndSlide.play();
        }
    }

    function allowDrop(ev) { ev.preventDefault(); }
    function drop(ev, type) {
        ev.preventDefault();
        const dataId = ev.dataTransfer.getData("text");
        const el = document.getElementById(dataId);
        const boardName = (type === 'like') ? '좋아요' : '싫어요';
        speak(`${el.textContent} ${boardName}! 최고야!`);
        document.getElementById('content-' + type).appendChild(el);
        sndSlide.play();
    }

    function shareResults() {
        sndSuccess.play();
        const msg = "우와! 우리 친구 보드판이 정말 예쁘게 완성됐네! 최고야!";
        speak(msg);
        alert(msg);
        window.print();
    }
</script>
</body>
</html>
